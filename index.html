<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="电影/动漫推荐墙 - 精选经典电影和动漫作品，为您呈现一场视觉与心灵的双重盛宴">
    <title>电影/动漫推荐墙 | 经典之作 · 值得一看</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="progress-bar" id="progress-bar"></div>
    <nav class="navbar">
        <div class="navbar-brand">电影/动漫推荐墙</div>
        <div class="navbar-links">
            <a href="index.html">首页</a>
            <a href="about.html">关于站长</a>
        </div>
    </nav>
    <header class="header">
        <div class="header-content">
            <h1 class="main-title">电影/动漫推荐墙</h1>
            <p class="subtitle">经典之作 · 值得一看</p>
            <button class="share-btn" id="share-btn">分享</button>
        </div>
        <div class="header-decoration"></div>
    </header>

    <main class="main-content">
        <section class="hero-section">
            <div class="hero-content">
                <h2 class="hero-title">探索经典 · 发现美好</h2>
                <p class="hero-description">每一帧都是艺术，每一段故事都值得铭记</p>
            </div>
        </section>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="动画电影">动画电影</button>
            <button class="filter-btn" data-filter="科幻电影">科幻电影</button>
            <button class="filter-btn" data-filter="动漫">动漫</button>
            <button class="filter-btn" data-filter="悬疑电影">悬疑电影</button>
        </div>

        <section class="recommendations-section">
            <h2 class="section-title">精选推荐</h2>
            
            <div class="card-grid" id="card-grid"></div>
        </section>

        <section class="guestbook-section">
            <h2 class="section-title">留言板</h2>
            <div class="guestbook-form">
                <input type="text" id="guest-name" placeholder="您的昵称" maxlength="20">
                <textarea id="guest-content" placeholder="写下您的留言..." maxlength="200"></textarea>
                <button id="submit-message">提交留言</button>
            </div>
            <div class="guestbook-list" id="guestbook-list"></div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p class="copyright">© 2026 电影/动漫推荐墙 · 经典永流传</p>
            <p class="footer-note">精选推荐 · 匠心呈现</p>
            <p><a href="about.html">关于站长</a></p>
        </div>
    </footer>

    <button class="back-to-top" id="back-to-top" title="返回顶部">&#8679;</button>

    <div class="lightbox" id="lightbox">
        <div class="lightbox-overlay"></div>
        <div class="lightbox-content">
            <button class="lightbox-close" id="lightbox-close">&times;</button>
            <button class="lightbox-prev" id="lightbox-prev">&#10094;</button>
            <img class="lightbox-img" id="lightbox-img" src="" alt="">
            <button class="lightbox-next" id="lightbox-next">&#10095;</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
